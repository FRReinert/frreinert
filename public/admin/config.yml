backend:
  # Em produção o admin/index.html força github + OAuth.
  # Em localhost força git-gateway + decap-server (grava no disco).
  name: github
  repo: FRReinert/frreinert
  branch: main
  base_url: https://frreinert-decap-oauth.fabricio-reinert.workers.dev
  auth_endpoint: auth
  site_domain: frreinert.github.io

# Usado só quando o proxy local (npm run cms) está ativo — ver admin/index.html
local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: publicacoes
    label: Publicações
    folder: src/content/publicacoes
    create: true
    # path_slug ASCII evita acentos no .md (quebra o watch do Astro em alguns casos)
    slug: "{{fields.path_slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - {
          label: Slug (URL),
          name: path_slug,
          widget: string,
          hint: "Obrigatório. Só a-z, 0-9 e hífen — ex: sao-joao-de-timbo-2026 (sem acentos).",
          pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Use apenas a-z, 0-9 e hífens (sem acentos)"],
        }
      - { label: Data, name: date, widget: datetime }
      - { label: Descrição, name: description, widget: text }
      - { label: Capa, name: cover, widget: image }
      - {
          label: Carrossel,
          name: carousel,
          widget: boolean,
          default: false,
          hint: "Mostra a galeria 2 a 2, sem borda, com swipe (colagens).",
        }
      - label: Galeria
        name: gallery
        widget: list
        required: false
        label_singular: foto
        summary: "{{fields.image}}"
        hint: "Adicione uma foto por vez com “Add foto”. A galeria pode ter várias imagens."
        field: { label: Imagem, name: image, widget: image }
      - label: Vídeos
        name: videos
        widget: list
        required: false
        label_singular: vídeo
        field:
          {
            label: URL ou caminho,
            name: url,
            widget: string,
            hint: "URL do YouTube/Vimeo ou caminho /images/uploads/...",
          }
      - { label: Texto, name: body, widget: markdown, required: false }

  - name: eventos
    label: Eventos
    folder: src/content/eventos
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Data, name: date, widget: datetime }
      - { label: Descrição, name: description, widget: text }
      - { label: Capa, name: cover, widget: image }
      - { label: Local, name: location, widget: string, required: false }
      - label: Fotos à venda
        name: photos
        widget: list
        summary: "{{fields.id}} — R$ {{fields.price}}"
        fields:
          - {
              label: Código,
              name: id,
              widget: string,
              hint: "Código único da foto (ex.: ana-pedro-001). É o que o cliente vê.",
            }
          - {
              label: Título interno,
              name: title,
              widget: string,
              required: false,
              hint: "Opcional — não aparece no site; só para organização no CMS",
            }
          - {
              label: Preview,
              name: preview,
              widget: image,
              hint: "Versão com marca d'água (pública)",
            }
          - {
              label: Preço (R$),
              name: price,
              widget: number,
              value_type: float,
              min: 0,
              step: 0.01,
            }
          - {
              label: Chave alta resolução,
              name: highresKey,
              widget: string,
              required: false,
              hint: "ID no storage privado — NÃO coloque URL pública da alta",
            }
      - { label: Texto, name: body, widget: markdown, required: false }
