<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .cms-banner {
        background: #1a1a1a;
        color: #f2efe9;
        padding: 0.75rem 1.25rem;
        font-size: 0.85rem;
        line-height: 1.4;
        border-bottom: 1px solid #333;
      }
      .cms-banner code {
        background: #333;
        padding: 0.1em 0.35em;
        border-radius: 3px;
      }
      .cms-error {
        max-width: 36rem;
        margin: 3rem auto;
        padding: 0 1.5rem;
        color: #111;
      }
      .cms-error h1 {
        font-size: 1.25rem;
      }
      .cms-error pre {
        background: #f4f4f4;
        padding: 0.75rem 1rem;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://unpkg.com/decap-cms@3.8.4/dist/decap-cms.js"></script>
    <script>
      (async function () {
        const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);

        function showError(title, detailHtml) {
          document.body.innerHTML =
            '<div class="cms-error"><h1>' +
            title +
            '</h1>' +
            detailHtml +
            '</div>';
        }

        try {
          const res = await fetch('/frreinert/admin/config.yml?v=local3', { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const config = jsyaml.load(await res.text());
          if (!config || !config.backend) throw new Error('config inválido');
          config.load_config_file = false;

          if (isLocal) {
            // Grava no disco via decap-server — NÃO no GitHub/produção
            let proxyOk = false;
            try {
              await fetch('http://127.0.0.1:8081/api/v1', { method: 'GET', mode: 'cors' });
              proxyOk = true;
            } catch (_) {
              proxyOk = false;
            }

            if (!proxyOk) {
              showError(
                'CMS local: decap-server não está rodando',
                '<p>Sem o proxy local, o Publish iria para o <strong>GitHub (produção)</strong>.</p>' +
                  '<p>Em outro terminal, na raiz do projeto:</p>' +
                  '<pre>npm run cms</pre>' +
                  '<p>Depois recarregue esta página. Mantenha também o <code>npm run dev</code>.</p>' +
                  '<p>Admin: <code>http://localhost:4321/frreinert/admin/</code></p>',
              );
              return;
            }

            config.backend = { name: 'git-gateway' };
            config.local_backend = {
              url: 'http://127.0.0.1:8081/api/v1',
            };

            const banner = document.createElement('div');
            banner.className = 'cms-banner';
            banner.innerHTML =
              'Modo <strong>local</strong>: alterações vão para os arquivos deste computador (não para produção).';
            document.body.prepend(banner);
          } else {
            // Produção: GitHub + OAuth Cloudflare
            config.local_backend = false;
            config.backend.name = 'github';
            config.backend.base_url = 'https://frreinert-decap-oauth.fabricio-reinert.workers.dev';
            config.backend.auth_endpoint = 'auth';
            config.backend.site_domain = 'frreinert.github.io';
          }

          window.CMS.init({ config: config });
        } catch (err) {
          showError(
            'Erro ao iniciar o CMS',
            '<p>' + String(err && err.message ? err.message : err) + '</p>',
          );
        }
      })();
    </script>
  </body>
</html>
